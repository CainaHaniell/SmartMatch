      'hbo max': { ramMin: 220, ramMax: 420, ghz: 1.4, armazenamento: 2.5 },
    };

    function gerarRecomendacao() {
      const urlParams = new URLSearchParams(window.location.search);
      const appsSelecionados = [];
      for (const [key, value] of urlParams.entries()) {
        if (key === "app") {
          appsSelecionados.push(value.toLowerCase());
        }
      }

      if (appsSelecionados.length === 0) {
        document.getElementById("resultado").innerText = "Nenhum app selecionado.";
        return;
      }

      let totalRamMinMB = 0;
      let totalRamMaxMB = 0;
      let maxGhz = 0;

      let armazenamentoAppsPequenos = 0;
      let armazenamentoMaxJogosGrandes = 0;

      for (const app of appsSelecionados) {
        const specs = appsSpecs[app];
        if (!specs) continue;

        totalRamMinMB += specs.ramMin;
        totalRamMaxMB += specs.ramMax;

        if (specs.armazenamento > 5) {
          // Jogo pesado
          if (specs.armazenamento > armazenamentoMaxJogosGrandes) {
            armazenamentoMaxJogosGrandes = specs.armazenamento;
          }
        } else {
          armazenamentoAppsPequenos += specs.armazenamento;
        }

        if (specs.ghz > maxGhz) maxGhz = specs.ghz;
      }

      // Soma +20GB do sistema Android
      const armazenamentoMinTotal = armazenamentoAppsPequenos + armazenamentoMaxJogosGrandes + 20;

      // Ajusta RAM para valores pares (exemplo: arredondar pra cima múltiplo de 2)
      function arredondarRam(ramMB) {
        const ramGB = Math.ceil(ramMB / 1024);
        return ramGB % 2 === 0 ? ramGB : ramGB + 1;
      }

      const ramMinRecomendada = arredondarRam(totalRamMinMB);
      const ramMaxRecomendada = arredondarRam(totalRamMaxMB);

      const resultadoTexto = `
        RAM mínima recomendada: ${ramMinRecomendada} GB<br />
        RAM máxima recomendada: ${ramMaxRecomendada} GB<br />
        Processador mínimo: ${maxGhz.toFixed(1)} GHz<br />
        Armazenamento mínimo: ${armazenamentoMinTotal.toFixed(1)} GB<br />
        Armazenamento ideal: ${(armazenamentoMinTotal + 10).toFixed(1)} GB
      `;

      document.getElementById("resultado").innerHTML = resultadoTexto;
    }

    window.onload = () => {
      gerarRecomendacao();
      document.getElementById("btn-voltar").addEventListener("click", () => {
        window.history.back();
      });
    };
